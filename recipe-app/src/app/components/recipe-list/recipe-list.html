<div class="recipe-list-container">
  <header class="header">
    <div class="header-content">
      <div class="header-left">
        <button class="icon-btn" (click)="goToSettings()" title="הגדרות">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
        <button class="icon-btn" (click)="logout()" title="התנתק">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>

      <div class="search-box-header">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input
          type="text"
          [(ngModel)]="searchTerm"
          (input)="onSearch()"
          placeholder="חפש מתכון..."
        />
      </div>

      <div class="brand">
        <span class="brand-icon">🍲</span>
        <h1 class="brand-name">טעמי הבית</h1>
      </div>
    </div>
  </header>

  <div class="search-section">
    <button class="add-btn" (click)="openAddModal()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      הוסף מתכון
    </button>
  </div>

  <div class="recipes-grid" *ngIf="filteredRecipes.length > 0">
    <div class="recipe-card" *ngFor="let recipe of filteredRecipes" (click)="viewRecipe(recipe.id)">
      <div class="recipe-image">
        <img [src]="recipe.imageUrl || 'https://via.placeholder.com/350x200/e8d5c4/5d4037?text=מתכון'" [alt]="recipe.title">
      </div>
      <div class="recipe-content">
        <h3>{{ recipe.title }}</h3>
        <div class="recipe-meta">
          <span>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            {{ recipe.prepTime + recipe.cookTime }} דקות
          </span>
          <span>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            {{ recipe.servings }} מנות
          </span>
        </div>
        <button class="delete-btn" (click)="deleteRecipe(recipe.id, $event)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="empty-state" *ngIf="filteredRecipes.length === 0">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="8" x2="12" y2="12"></line>
      <line x1="12" y1="16" x2="12.01" y2="16"></line>
    </svg>
    <h3>לא נמצאו מתכונים</h3>
    <p>נסה לחפש משהו אחר או הוסף מתכון חדש</p>
  </div>

  <div class="modal" *ngIf="showAddModal" (click)="closeAddModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>הוסף מתכון חדש</h2>
        <button class="close-btn" (click)="closeAddModal()">&times;</button>
      </div>
      <form (ngSubmit)="addRecipe()" class="modal-form">
        <div class="form-group">
          <label>שם המתכון</label>
          <input type="text" [(ngModel)]="newRecipe.title" name="title" required>
        </div>

        <div class="form-group image-upload-group">
          <label>תמונת המתכון</label>
          
          <div class="image-upload-options">
            <div class="upload-option">
              <label class="upload-label">
                <input type="file" accept="image/*" (change)="onImageSelected($event)" hidden>
                <div class="upload-button">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                  </svg>
                  <span>העלה תמונה מהמחשב</span>
                </div>
              </label>
            </div>

            <div class="divider-text">או</div>

            <div class="upload-option">
              <input 
                type="url" 
                [(ngModel)]="newRecipe.imageUrl" 
                name="imageUrl" 
                placeholder="הדבק קישור לתמונה מהאינטרנט"
                class="url-input"
              >
            </div>
          </div>

          <div class="image-preview" *ngIf="imagePreview || newRecipe.imageUrl">
            <img [src]="imagePreview || newRecipe.imageUrl" alt="תצוגה מקדימה">
            <button type="button" class="remove-image-btn" (click)="removeImage()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label>חומרים</label>
          <div class="list-items">
            <div class="list-item" *ngFor="let ingredient of newRecipe.ingredients; let i = index; trackBy: trackByIndex">
              <input type="text" [(ngModel)]="newRecipe.ingredients[i]" [name]="'ingredient-' + i" required>
              <button type="button" class="remove-btn" (click)="removeIngredient(i)" *ngIf="newRecipe.ingredients.length > 1">&times;</button>
            </div>
          </div>
          <button type="button" class="add-item-btn" (click)="addIngredient()">הוסף חומר</button>
        </div>

        <div class="form-group">
          <label>הוראות הכנה</label>
          <div class="list-items">
            <div class="list-item" *ngFor="let instruction of newRecipe.instructions; let i = index; trackBy: trackByIndex">
              <textarea [(ngModel)]="newRecipe.instructions[i]" [name]="'instruction-' + i" required></textarea>
              <button type="button" class="remove-btn" (click)="removeInstruction(i)" *ngIf="newRecipe.instructions.length > 1">&times;</button>
            </div>
          </div>
          <button type="button" class="add-item-btn" (click)="addInstruction()">הוסף שלב</button>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>זמן הכנה (דקות)</label>
            <input type="number" [(ngModel)]="newRecipe.prepTime" name="prepTime" min="0" required>
          </div>
          <div class="form-group">
            <label>זמן בישול (דקות)</label>
            <input type="number" [(ngModel)]="newRecipe.cookTime" name="cookTime" min="0" required>
          </div>
          <div class="form-group">
            <label>מספר מנות</label>
            <input type="number" [(ngModel)]="newRecipe.servings" name="servings" min="1" required>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="cancel-btn" (click)="closeAddModal()">ביטול</button>
          <button type="submit" class="submit-btn">הוסף מתכון</button>
        </div>
      </form>
    </div>
  </div>
</div>
